<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabelas</title>
  <style>
    table {
      border-collapse: collapse;
    }
    th, td {
      padding-left: 20px;
      padding-right: 20px;
      border: 1px solid black;
    }
  </style>
</head>
<body>
  <h1>Trabalho de Tabela</h1>
  <table>
    <tr>
      <th>Email</th>
      <th>Tobias</th>
      <th>Linus</th>
    </tr>
    <tr>
      <th>&nbsp;</th>
      <th></th>
      <th></th>
    </tr>
    <tr>
      <th>&nbsp;</th>
      <th></th>
      <th></th>
    </tr>
    <tr>
      <th>&nbsp;</th>
      <th></th>
      <th></th>
    </tr>
    <tr>
      <th>&nbsp;</th>
      <th></th>
      <th></th>
    </tr>
    <tr>
      <th>&nbsp;</th>
      <th></th>
      <th></th>
    </tr>
  </table>

  <br>
  <table>
    <tr>
      <th colspan="2">Nome</th>
      <th>Idade</th>
    </tr>
    <tr>
      <td>João</td>
      <td>Gilberto</td>
      <td>40</td>
    </tr>
  </table>
</body>
</html>
